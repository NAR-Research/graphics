<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2024 Median Income</title>

  <!-- Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrap">
    <h1>2024 Median Income</h1>

    <div class="row">
      <div class="label">Married Couple</div>
      <div class="barTrack">
        <div class="bar bar--married" style="width: 100%;">
          <span class="value">$125,000</span>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="label">Single Female</div>
      <div class="barTrack">
        <div class="bar bar--female" style="width: 61.12%;">
          <span class="value">$76,400</span>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="label">Single Male</div>
      <div class="barTrack">
        <div class="bar bar--male" style="width: 63.44%;">
          <span class="value">$79,300</span>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="label">Unmarried Couple</div>
      <div class="barTrack">
        <div class="bar bar--unmarried" style="width: 92.8%;">
          <span class="value">$116,000</span>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="label">Other</div>
      <div class="barTrack">
        <div class="bar bar--other" style="width: 67.12%;">
          <span class="value">$83,900</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
